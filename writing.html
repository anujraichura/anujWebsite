<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Writing, Anuj Raichura</title>
    <meta
      name="description"
      content="Anuj Raichura's writing, embedded from Cyclicality on Substack."
    >
    <link rel="icon" href="mountain.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Anuj Raichura home">
        <img class="brand-mark" src="mountain.svg" alt="" aria-hidden="true">
        <span>Anuj Raichura</span>
      </a>
      <nav aria-label="Primary navigation">
        <a href="writing.html" aria-current="page">Writing</a>
        <a href="index.html#work">Work</a>
      </nav>
    </header>

    <main class="writing-page">
      <section class="writing-hero" aria-labelledby="writing-title">
        <div class="writing-copy">
          <p class="project-kicker">Writing</p>
          <h1 id="writing-title">Cyclicality</h1>
          <p class="project-deck">
            My thoughts on AI, venture capital, and anything else that interests me.
          </p>
        </div>
        <a class="writing-link" href="https://cyclicality.substack.com/" target="_blank" rel="noreferrer">
          Open on Substack
        </a>
      </section>

      <section class="writing-feed" aria-labelledby="latest-writing">
        <div class="section-heading">
          <h2 id="latest-writing">Latest posts</h2>
          <a href="https://cyclicality.substack.com/">All writing</a>
        </div>

        <div class="writing-grid" id="writing-grid">
          <p class="feed-loading">Loading posts…</p>
        </div>
      </section>
    </main>

    <script>
      const FEED_URL = 'https://cyclicality.substack.com/feed';
      const API = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(FEED_URL)}`;

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      async function loadPosts() {
        const grid = document.getElementById('writing-grid');
        try {
          const res = await fetch(API);
          const data = await res.json();
          if (data.status !== 'ok') throw new Error('Feed error');

          grid.innerHTML = data.items.map(item => `
            <a class="writing-card" href="${item.link}" target="_blank" rel="noreferrer">
              <time datetime="${item.pubDate}">${formatDate(item.pubDate)}</time>
              <h3>${item.title}</h3>
              <p>${item.description.replace(/<[^>]*>/g, '').slice(0, 100).trim()}…</p>
              <span>Read on Substack</span>
            </a>
          `).join('');
        } catch {
          grid.innerHTML = '<p class="feed-error">Could not load posts. <a href="https://cyclicality.substack.com/" target="_blank" rel="noreferrer">Visit Substack directly.</a></p>';
        }
      }

      loadPosts();
    </script>
  </body>
</html>
